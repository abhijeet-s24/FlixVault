<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlixVault</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-[#111] text-white">
    <header class="text-center mb-10">
        <h1 class="text-4xl mb-5 mt-5 mb-5 font-mono p-3">🎥 FlixVault 🎬</h1>
        <div id="container" class="text-xl mt-5">
            <input type="text" id="search" placeholder="Search Movies..." class="bg-zinc-500 rounded-bl-md rounded-tl-md">
            <button id="searchBtn" class="bg-blue-500 rounded-tr-md rounded-br-md" >Search</button>
            <button id="filterBtn" class="bg-yellow-500 px-2 rounded hover:bg-yellow-600">⭐️ 7+</button>
            <button id="sortHigh" class="bg-blue-500 px-2 rounded hover:bg-blue-600">⬆ Rating</button>
            <button id="sortLow" class="bg-blue-500 px-2 rounded hover:bg-blue-600">⬇ Rating</button>
            <button id="themeToggle" class="bg-pink-700 px-2 rounded hover:bg-pink-500"> 🌙 Theme</button>
        </div>
    </header>
    
    <main id="movies" class="grid grid-cols-5 gap-7 m-5 p-2"></main>

    <footer class="bg-black text-gray-400 text-center py-4 mt-6">  
        <p class="text-sm">
            © 2026 FlixVault. All rights reserved.
        </p>
        <p class="text-xs mt-1">
            This product uses the TMDB API but is not endorsed or certified by TMDB.
        </p>
        <p class="text-xs mt-1">
            Made by Abhijeet Saini
        </p>
    </footer>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</body>
</html>
